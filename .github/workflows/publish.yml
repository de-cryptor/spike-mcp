name: Publish to PyPI

on:
  push:
    tags:
      - "v*"   # triggers on git tag v0.1.0, v1.0.0, etc.

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for trusted publishing (OIDC)

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Uses PyPI Trusted Publishing — no API token stored in GitHub secrets.
        # One-time setup: https://pypi.org/manage/project/spike-mcp/settings/publishing/
        # Configure a "pending publisher" with:
        #   Owner: de-cryptor  Repository: spike-mcp
        #   Workflow: publish.yml  Environment: pypi
